<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <section class="main-navigationsection">
        <div class="main-navigation">
            <div class="main-navigation-logo">
                <p>Name</p>
            </div>
            <div class="main-navigation-navigate">
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">About</a></li>
                    <li><a href="">Contact</a></li>
                    <li><a href="">Admin</a></li>
                </ul>
            </div>
            <div class="main-navigation-daynight">
                <p>Daynight</p>
            </div>
        </div>
    </section>

    <!-- Hero Section -->
    <section class="main-herosection">
        <div class="main-herosection-div">
            <div class="main-herosection-div-left">
                <h1>Make Designs That <span class="main-herosection-div-left-h1design">Engage, Delight & Connect</span>
                </h1>
                <p>BCA Section C Team Project, i know we are loosers but we are damm good to loose.</p>
                <br>
                <input type="button" value="Check Now" class="main-herosection-div-left-button" onclick="CheckNow()" />

            </div>
            <div class="main-herosection-div-right">
                <img src="../image/hero.png" alt="left-div-image">
            </div>

        </div>

    </section>


    <!-- Contact & Support -->
    <section class="main-contactsupportsection">
        <div class="main-contactsupport-div">
            <div class="main-contactsupport-div-left">
                <img src="../image/hero.png" alt="contactsupportimage" />
            </div>
            <div class="main-contactsupport-div-right">
                <h1>DetailsSection</h1>
                <p>Name</p>
                <input type="text" placeholder="Enter Your Name" class="main-contactsupport-div-right-input" />
                <p>Email</p>
                <input type="text" placeholder="Enter Your Email" class="main-contactsupport-div-right-input" />
                <p>Mobile Number</p>
                <input type="number" placeholder="Enter Your Mobile Number" class="main-contactsupport-div-right-input" />
                <p>Feedback</p>
                <input type="text" placeholder="Feedback" class="main-contactsupport-div-right-input" />
                <br>
                <input type="button" value="Submit" class="main-contactsupport-div-right-button" />
            </div>
        </div>
    </section>

</body>
<script src="main.js"></script>

</html>
