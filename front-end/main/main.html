<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <section class="main-navigationsection">
        <div class="main-navigation">
            <div class="main-navigation-logo">
                <p>Name</p>
            </div>
            <div class="main-navigation-navigate">
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">About</a></li>
                    <li><a href="">Contact</a></li>
                    <li><a href="">Admin</a></li>
                </ul>
            </div>
            <div class="main-navigation-daynight">
                <p>Daynight</p>
            </div>
        </div>
    </section>

    <!-- Hero Section -->
    <section class="main-herosection">
        <div class="main-herosection-div">
            <div class="main-herosection-div-left">
                <h1>Make Designs That <span class="main-herosection-div-left-h1design">Engage, Delight & Connect</span>
                </h1>
                <p>BCA Section C Team Project, i know we are loosers but we are damm good to loose.</p>
                <br>
                <input type="button" value="Check Now" class="main-herosection-div-left-button" onclick="CheckNow()" />

            </div>
            <div class="main-herosection-div-right">
                <img src="../image/hero.png" alt="left-div-image">
            </div>

        </div>

    </section>


    <!-- Contact & Support -->
    <section class="main-contactsupportsection">
        <div class="main-contactsupport-div">
            <div class="main-contactsupport-div-left">
                <img src="../image/customersupport.png" alt="contactsupportimage" />
            </div>
            <div class="main-contactsupport-div-right">
                <h1>Customer & Support</h1>
                <form class="main-contactsupport-div-right-form">
                    <div class="main-contactsupport-div-right-form-input">
                        <label>Name</label>
                        <input type="text" placeholder="Enter Your Name"/>
                    </div>
                    <div class="main-contactsupport-div-right-form-input">
                        <label>Email</label>
                        <input type="text" placeholder="Enter Your Email"/>
                    </div>
                    <div class="main-contactsupport-div-right-form-input">
                        <label>Mobile Number</label>
                        <input type="tel" placeholder="Enter Your Mobile Number"  />
                    </div>
                    <div class="main-contactsupport-div-right-form-input">
                        <label>Feedback</label>
                        <textarea type="text" placeholder="Write Your Feedback Here ..."></textarea>
                    </div>
                    
                </form>
                <input type="button" value="Submit Feedback" class="main-contactsupport-div-right-button" onclick="CustomerSupport()" /> 
            </div>
        </div>
    </section>

</body>
<script src="main.js"></script>

</html>
